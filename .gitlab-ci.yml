stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: "unix:///var/run/docker.sock"
  GIT_CLEAN_FLAGS: -ffdx

# ---------- TEMPLATES ----------
.build_template:
  stage: build
  image: docker:25
  script:
    - docker compose build

.deploy_template:
  stage: deploy
  image: docker:25
  script:
    - docker compose down
    - docker compose up -d
    - docker image prune -f

# ---------- DEV ----------
build-dev:
  extends: .build_template
  tags: [wfm_dev]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

deploy-dev:
  extends: .deploy_template
  tags: [wfm_dev]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

# ---------- PROD ----------
build-prod:
  extends: .build_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-prod:
  extends: .deploy_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'