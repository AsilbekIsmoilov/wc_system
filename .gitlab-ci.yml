stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: "unix:///var/run/docker.sock"
  GIT_CLEAN_FLAGS: -ffdx

# ---------- TEMPLATES ----------
.build_template:
  stage: build
  image: docker:25
  # Авто-повтор при сбоях runner'а (в т.ч. таймаут pull образа docker:25).
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose build

.deploy_template:
  stage: deploy
  image: docker:25
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose down
    - docker compose up -d
    - docker image prune -f

# ---------- PROD ----------
build-prod:
  extends: .build_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ВРЕМЕННО: грепаем логи ТЕКУЩЕГО (ещё работающего) web ДО того как deploy его
# пересоздаст (down). Здесь будет traceback реального 500 из браузера.
logs-prod:
  stage: build
  image: docker:25
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "================ TRACEBACK (most recent call last) ================"
    - docker compose logs web 2>&1 | grep -A 35 "Traceback (most recent call last)" | tail -200 || true
    - echo "================ Internal Server Error / Exception in ASGI ================"
    - docker compose logs web 2>&1 | grep -B2 -A 35 -iE "Internal Server Error|Exception in ASGI" | tail -200 || true

deploy-prod:
  extends: .deploy_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'