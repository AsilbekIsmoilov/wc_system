stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: "unix:///var/run/docker.sock"
  GIT_CLEAN_FLAGS: -ffdx

# ---------- TEMPLATES ----------
.build_template:
  stage: build
  image: docker:25
  # Авто-повтор при сбоях runner'а (в т.ч. таймаут pull образа docker:25).
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose build

.deploy_template:
  stage: deploy
  image: docker:25
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose down
    - docker compose up -d
    - docker image prune -f

# ---------- PROD ----------
build-prod:
  extends: .build_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ВРЕМЕННО: грепаем логи ТЕКУЩЕГО (ещё работающего) web ДО того как deploy его
# пересоздаст (down). Здесь будет traceback реального 500 из браузера.
logs-prod:
  stage: build
  image: docker:25
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - echo "===== docker ps ====="
    - docker ps --format '{{.Names}}' || true
    - echo "===== docker compose logs --tail 300 web ====="
    - docker compose logs --tail=300 web 2>&1 || true
    - echo "===== docker logs --tail 300 wc_system-web-1 ====="
    - docker logs --tail=300 wc_system-web-1 2>&1 || true

deploy-prod:
  extends: .deploy_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'