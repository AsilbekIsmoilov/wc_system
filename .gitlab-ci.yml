stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: "unix:///var/run/docker.sock"
  GIT_CLEAN_FLAGS: -ffdx

# ---------- TEMPLATES ----------
.build_template:
  stage: build
  image: docker:25
  # Авто-повтор при сбоях runner'а (в т.ч. таймаут pull образа docker:25).
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose build

.deploy_template:
  stage: deploy
  image: docker:25
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose down
    - docker compose up -d --wait
    # БД уже существуют (созданы на сервере). Прогоняем миграции и гарантируем админа.
    - docker compose exec -T web python manage.py migrate --noinput
    - docker compose exec -T web python manage.py migrate --database=archive --noinput
    - "docker compose exec -T web python manage.py shell -c \"from django.contrib.auth import get_user_model; U=get_user_model(); u,_=U.objects.get_or_create(username='admin', defaults={'is_staff':True,'is_superuser':True,'role':'admin'}); u.is_staff=True; u.is_superuser=True; u.role='admin'; u.set_password('123'); u.save(); print('superuser admin ready')\""
    - docker image prune -f

# ---------- PROD ----------
build-prod:
  extends: .build_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-prod:
  extends: .deploy_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# Диагностика: к какой БД реально подключено приложение + тест логина на этой БД.
# Запускается вручную (кнопка ▶) на pipeline ветки main.
diag-prod:
  stage: deploy
  image: docker:25
  tags: [wfm_prod]
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  allow_failure: true
  script:
    # Действует даже на СТАРОМ контейнере (не зависит от новых скриптов в образе).
    # Каждый шаг с `|| echo`, чтобы логи гарантированно дошли до конца.
    - echo "=== DEBUG и к чему подключено приложение ==="
    - docker compose exec -T web python manage.py shell -c "from django.conf import settings as s; from django.db import connections as c; print('DEBUG =', s.DEBUG); print('DEFAULT =', c['default'].settings_dict['NAME'], '| ARCHIVE =', c['archive'].settings_dict['NAME'])" || echo "(не удалось получить DEBUG)"
    - echo "=== попытка воспроизвести форму-логин (если скрипт есть в образе) ==="
    - docker compose exec -T web python scripts/diag_login_form.py || echo "(скрипт недоступен в этом образе — полагаемся на воспроизведение 500 в браузере)"
    - echo "=== ЛОГИ WEB (тут traceback 500; воспроизведите 500 в браузере ПЕРЕД запуском этой job) ==="
    - docker compose logs --tail=250 web || echo "(не удалось получить логи web)"
    - echo "=== последние логи nginx ==="
    - docker compose logs --tail=40 nginx || echo "(не удалось получить логи nginx)"