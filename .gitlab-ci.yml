stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: "unix:///var/run/docker.sock"
  GIT_CLEAN_FLAGS: -ffdx

# ---------- TEMPLATES ----------
.build_template:
  stage: build
  image: docker:25
  # Авто-повтор при сбоях runner'а (в т.ч. таймаут pull образа docker:25).
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose build

.deploy_template:
  stage: deploy
  image: docker:25
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose down
    - docker compose up -d --wait
    # БД уже существуют (созданы на сервере). Прогоняем миграции и гарантируем админа.
    - docker compose exec -T web python manage.py migrate --noinput
    - docker compose exec -T web python manage.py migrate --database=archive --noinput
    - "docker compose exec -T web python manage.py shell -c \"from django.contrib.auth import get_user_model; U=get_user_model(); u,_=U.objects.get_or_create(username='admin', defaults={'is_staff':True,'is_superuser':True,'role':'admin'}); u.is_staff=True; u.is_superuser=True; u.role='admin'; u.set_password('123'); u.save(); print('superuser admin ready')\""
    - docker image prune -f

# ---------- PROD ----------
build-prod:
  extends: .build_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-prod:
  extends: .deploy_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# Диагностика: к какой БД реально подключено приложение + тест логина на этой БД.
# Запускается вручную (кнопка ▶) на pipeline ветки main.
diag-prod:
  stage: deploy
  image: docker:25
  tags: [wfm_prod]
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  allow_failure: true
  script:
    - echo "=== базы, которые реально существуют на MySQL-сервере ==="
    - docker compose exec -T db sh -c 'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "SHOW DATABASES;"'
    - echo "=== к чему подключено приложение + тест логина ==="
    - docker compose exec -T web python scripts/diag_conn.py
    - echo "=== ПОЛНЫЙ HTTP-путь через nginx (nginx -> web) ==="
    - docker compose exec -T web python scripts/diag_nginx.py
    - echo "=== ВОСПРОИЗВЕДЕНИЕ браузерного входа /api-auth/login/ (форма + CSRF) ==="
    - docker compose exec -T web python scripts/diag_login_form.py
    - echo "=== логи web (тут будет traceback 500, если он есть) ==="
    - docker compose logs --tail=120 web
    - echo "=== последние логи nginx ==="
    - docker compose logs --tail=40 nginx