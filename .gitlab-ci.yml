stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: "unix:///var/run/docker.sock"
  GIT_CLEAN_FLAGS: -ffdx

# ---------- TEMPLATES ----------
.build_template:
  stage: build
  image: docker:25
  # Авто-повтор при сбоях runner'а (в т.ч. таймаут pull образа docker:25).
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose build

.deploy_template:
  stage: deploy
  image: docker:25
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose down
    # 1. Поднять БД и дождаться готовности (--wait по healthcheck).
    - docker compose up -d --wait db
    # 2. Гарантировать существование БД (на случай DROP DATABASE / пустого тома).
    - docker compose exec -T db sh -c 'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS wc_system_default CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE DATABASE IF NOT EXISTS wc_system_archive CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"'
    # 3. Поднять остальные сервисы.
    - docker compose up -d --wait
    # 4. Миграции + seed ЯВНО из CI (не зависит от RUN_MIGRATIONS в контейнере).
    - docker compose exec -T web python manage.py migrate --noinput
    # seed (типы/смены/политики/активный цикл) — критично для работы приложения,
    # делаем ДО archive, чтобы он отработал даже при проблемах с архивом.
    - docker compose exec -T web python manage.py seed_initial_data
    # archive: таблицы могли существовать без записи в истории миграций
    # (прерванная миграция; на MySQL DDL не транзакционна). При конфликте
    # "table already exists" — помечаем миграции как применённые (--fake).
    - docker compose exec -T web python manage.py migrate --database=archive --noinput || docker compose exec -T web python manage.py migrate --database=archive --fake --noinput
    - docker image prune -f
    # ВРЕМЕННАЯ диагностика 500 — логи web в job-лог (убрать после)
    - docker compose logs --tail=120 web || true

# ---------- PROD ----------
build-prod:
  extends: .build_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-prod:
  extends: .deploy_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'