stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: "unix:///var/run/docker.sock"
  GIT_CLEAN_FLAGS: -ffdx

.build_template:
  stage: build
  image: docker:25
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose build

.deploy_template:
  stage: deploy
  image: docker:25
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose down
    - docker compose up -d --wait
    - docker compose exec -T web python manage.py migrate --noinput
    - docker compose exec -T web python manage.py migrate --database=archive --noinput
    - "docker compose exec -T web python manage.py shell -c \"from django.contrib.auth import get_user_model; U=get_user_model(); u,_=U.objects.get_or_create(username='admin', defaults={'is_staff':True,'is_superuser':True,'role':'admin'}); u.is_staff=True; u.is_superuser=True; u.role='admin'; u.set_password('123'); u.save(); print('superuser admin ready')\""
    - docker image prune -f

build-prod:
  extends: .build_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-prod:
  extends: .deploy_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# Просмотр логов прод-приложения (traceback'и 500 и т.п.).
# Запускается вручную (кнопка ▶) на pipeline ветки main.
# Порядок: воспроизведите ошибку в браузере -> запустите этот job.
logs-prod:
  stage: deploy
  image: docker:25
  tags: [wfm_prod]
  needs: []
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  allow_failure: true
  script:
    # Копируем скрипт в живой контейнер (не нужен rebuild) и запускаем:
    # он бьёт ПО СЕТИ на реальный http://10.145.20.9:4020 (через всё, что
    # стоит перед контейнером), как браузер.
    - echo "=== ВОСПРОИЗВЕДЕНИЕ входа как браузер (реальный внешний URL) ==="
    - docker compose cp scripts/check_login.py web:/tmp/check_login.py && docker compose exec -T web python /tmp/check_login.py || echo "(не удалось запустить check_login.py)"
    - echo "=== ВСЕ контейнеры на хосте (ищем, кто держит порт 4020) ==="
    - docker ps -a --format "table {{.Names}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}" || echo "(docker ps не сработал)"
    - echo "=== все compose-проекты на хосте ==="
    - docker compose ls -a || echo "(docker compose ls не сработал)"
    - echo "=== logs/errors.log (полные traceback'и 5xx) ==="
    - docker compose exec -T web sh -c 'cat /app/logs/errors.log 2>/dev/null || echo "(файл /app/logs/errors.log пуст или отсутствует)"'
    - echo "=== консольные логи web (tail 250) ==="
    - docker compose logs --tail=250 web || echo "(не удалось получить логи web)"
    - echo "=== логи nginx (tail 40) ==="
    - docker compose logs --tail=40 nginx || echo "(не удалось получить логи nginx)"