stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: "unix:///var/run/docker.sock"
  GIT_CLEAN_FLAGS: -ffdx

.build_template:
  stage: build
  image: docker:25
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose build

.deploy_template:
  stage: deploy
  image: docker:25
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  script:
    - docker compose down
    - docker compose up -d --wait
    - docker compose exec -T web python manage.py migrate --noinput
    - docker compose exec -T web python manage.py migrate --database=archive --noinput
    - "docker compose exec -T web python manage.py shell -c \"from django.contrib.auth import get_user_model; U=get_user_model(); u,_=U.objects.get_or_create(username='admin', defaults={'is_staff':True,'is_superuser':True,'role':'admin'}); u.is_staff=True; u.is_superuser=True; u.role='admin'; u.set_password('123'); u.save(); print('superuser admin ready')\""
    - docker image prune -f

build-prod:
  extends: .build_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy-prod:
  extends: .deploy_template
  tags: [wfm_prod]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# Просмотр логов прод-приложения (traceback'и 500 и т.п.).
# Запускается вручную (кнопка ▶) на pipeline ветки main.
# Порядок: воспроизведите ошибку в браузере -> запустите этот job.
logs-prod:
  stage: deploy
  image: docker:25
  tags: [wfm_prod]
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  allow_failure: true
  script:
    # 1) Детерминированно воспроизводим ТОТ ЖЕ вход, что и браузер:
    #    GET /api-auth/login/ (берём csrftoken) -> POST с логином/паролем/CSRF,
    #    через nginx, изнутри контейнера. Так исключаем кэш/тайминг браузера.
    - echo "=== СЕРВЕРНОЕ воспроизведение /api-auth/login/ (форма + CSRF, через nginx) ==="
    - |
      docker compose exec -T web python - <<'PY'
      import http.cookiejar, re, urllib.parse, urllib.request, urllib.error
      BASE = "http://nginx"; LOGIN = BASE + "/api-auth/login/"
      jar = http.cookiejar.CookieJar()
      op = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(jar))
      html = op.open(urllib.request.Request(LOGIN), timeout=15).read().decode("utf-8", "replace")
      m = re.search(r'name="csrfmiddlewaretoken"\s+value="([^"]+)"', html)
      token = m.group(1) if m else ""
      print("  csrfmiddlewaretoken:", "FOUND" if token else "MISSING")
      data = urllib.parse.urlencode({"username": "admin", "password": "123",
                                     "csrfmiddlewaretoken": token, "next": "/api/v1/"}).encode()
      req = urllib.request.Request(LOGIN, data=data,
                                   headers={"Content-Type": "application/x-www-form-urlencoded", "Referer": LOGIN},
                                   method="POST")
      try:
          r = op.open(req, timeout=15)
          print("  POST /api-auth/login/ ->", r.status, "(вход отработал, 500 НЕТ)")
          print("  body:", r.read()[:200].decode("utf-8", "replace"))
      except urllib.error.HTTPError as e:
          print("  POST /api-auth/login/ -> HTTP", e.code, "(вот она, ошибка)")
          print("  body:", e.read()[:400].decode("utf-8", "replace"))
      except Exception as e:
          print("  ОШИБКА:", repr(e))
      PY
    - echo "=== logs/errors.log (полные traceback'и 5xx) ==="
    - docker compose exec -T web sh -c 'cat /app/logs/errors.log 2>/dev/null || echo "(файл /app/logs/errors.log пуст или отсутствует)"'
    - echo "=== консольные логи web (tail 250) ==="
    - docker compose logs --tail=250 web || echo "(не удалось получить логи web)"
    - echo "=== логи nginx (tail 40) ==="
    - docker compose logs --tail=40 nginx || echo "(не удалось получить логи nginx)"