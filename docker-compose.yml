x-app-env: &app-env
  SECRET_KEY: ${SECRET_KEY}
  DEBUG: ${DEBUG:-0}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
  DB_NAME: ${DB_NAME:-wc_system_default}
  DB_NAME_ARCHIVE: ${DB_NAME_ARCHIVE:-wc_system_archive}
  DB_USER: ${DB_USER:-root}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_HOST: ${DB_HOST:-db}
  DB_PORT: ${DB_PORT:-3306}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/3}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/4}
  WFM_BASE_URL: ${WFM_BASE_URL}
  SYNC_SERVICE_TOKEN: ${SYNC_SERVICE_TOKEN}
  WFM_HTTP_TIMEOUT: ${WFM_HTTP_TIMEOUT:-30}

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-wc_system_default}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379"

  web:
    build: .
    restart: unless-stopped
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "1"
      DEBUG: "1"   # ВРЕМЕННО для диагностики 500 — ВЕРНУТЬ в "0" после!
    volumes:
      - ./creds.json:/app/creds.json:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn core.asgi:application --host 0.0.0.0 --port 8000
    expose:
      - "8000"

  worker:
    build: .
    restart: unless-stopped
    environment:
      <<: *app-env
    volumes:
      - ./creds.json:/app/creds.json:ro
    depends_on:
      - db
      - redis
    command: celery -A core worker -l info

  beat:
    build: .
    restart: unless-stopped
    environment:
      <<: *app-env
    volumes:
      - ./creds.json:/app/creds.json:ro
    depends_on:
      - db
      - redis
    command: celery -A core beat -l info

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "4020:80"
    volumes:
      - static_volume:/static:ro
      - media_volume:/media:ro

volumes:
  mysql_data:
  static_volume:
  media_volume: