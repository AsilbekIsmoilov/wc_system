services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password123}
      MYSQL_DATABASE: ${DB_NAME:-project1}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-password123}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    env_file: .env
    environment:
      RUN_MIGRATIONS: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn core.asgi:application --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  worker:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A core worker -l info

  beat:
    build: .
    env_file: .env
    depends_on:
      - db
      - redis
    command: celery -A core beat -l info

volumes:
  mysql_data:
