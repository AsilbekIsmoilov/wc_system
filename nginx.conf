# Connection: "upgrade" только для WebSocket-запросов; для обычных HTTP — "close".
# Раньше стояло безусловное "upgrade", из-за чего обычные запросы (напр. /api/v1/)
# падали с 500 на ASGI/uvicorn.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream django_app { server web:8000; }

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    location /static/ { alias /static/; access_log off; expires 7d; }
    location /media/  { alias /media/;  access_log off; expires 7d; }

    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $http_host;          
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}